name: Build and Release Quarkus MCP server

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Read version from pom.xml
        id: version
        shell: bash
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "release_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        run: mvn -B clean package -Dquarkus.package.jar.type=uber-jar

      - name: Find JAR
        id: jar
        shell: bash
        run: |
          JAR_PATH="$(ls -1 target/*.jar | grep -v original | head -n 1)"
          echo "jar_path=$JAR_PATH" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.release_tag }}
          git push origin ${{ steps.version.outputs.release_tag }}

      - name: Create GitHub Release and upload JAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          files: ${{ steps.jar.outputs.jar_path }}
          generate_release_notes: true

      - name: Bump pom version to next minor release
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.release_version }}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEXT_VERSION="$MAJOR.$((MINOR + 1)).0"
          mvn -B versions:set -DnewVersion="$NEXT_VERSION" -DgenerateBackupPoms=false

      - name: Commit and push next version
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "chore: bump version to next minor release after ${{ steps.version.outputs.release_tag }}"
          git push origin HEAD
